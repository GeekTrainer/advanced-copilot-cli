name: Feature request
description: Propose a new AssetTrack capability or improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature or improvement are you requesting?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or team need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which services, pages, APIs, or tests are likely involved?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Codespaces, devcontainer, local OS, browser, or service version.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which commands or checks should prove the feature works?
    validations:
      required: false
